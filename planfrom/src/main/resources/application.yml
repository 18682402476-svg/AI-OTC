spring:
  application:
    name: agent-otc-platform
  
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/agent_otc?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
  
  # Redis配置
  redis:
    host: 127.0.0.1
    port: 6379
    password: 123456
    database: 0

# MyBatis配置
mybatis:
  type-aliases-package: com.agentotc.model
  mapper-locations: classpath:com/agentotc/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    jdbc-type-for-null: 'NULL'

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# EVM节点配置
evm:
  node-url: http://localhost:8545
  chain-id: 31337

# 安全配置
security:
  token-expire: -1  # -1表示永不过期
  private-key-encrypt: true

# 交易配置
trade:
  fee-rate: 0.01  # 1%手续费
  reward-pool-address: 0xYourRewardPoolAddress

# Web3配置
web3:
  evm:
    node:
      url: https://testnet-rpc.monad.xyz
    contract:
      address: "0x057AAD6a25F58f384673c5C7Fc10351489e4D3d6"
    usdc:
      address: "0x1E85f6e91e5370E91D74196d249ce703E0993fb7"
    private:
      key: "0x****************************************************************"
  transaction:
    confirmation-blocks: 6
    timeout-seconds: 300
